<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>sign up form </title>
</head>
<body>
<div class="wrapper">
   <div class="left">
    <img src="rebell logo 2.png" alt="">
   </div>
  <div class="center">
    <div class="header">
        <h1>FOR  MY  REBELLIOUS  FELLOWS</h1>
        <P>Ready to question everything and break the mold?<br>
            sign up to join our cause.
        </P>
    </div>
     <form action="" method="post">
        <p>
            <label for="first name">first name</label>
            <input type="text" required placeholder="David" >
        </p>
        <p>
            <label for="last name">last name</label>
            <input type="text" required placeholder="Martinez" >
        </p>
        <p>
            <label for="email">email</label>
            <input type="email"  required placeholder="enter your email" >
        </p>
        <p>
            <label for="phone number">phone number</label>
            <input type="text" required placeholder="enter your number" >
        </p>
        <p>
            <label for="password">password</label>
            <input type="password" required minlength="8" placeholder="enter password" >
        </p>
        <p>
            <label for="confirm password"> confirm password</label>
            <input type="password" required minlength="8" placeholder="enter password" >
        </p>
        <p class="buttonDiv">
            <button type="submit">create Account</button>
            <p>already in our crew?<a href="">sign in</a></p>
        </p>
     </form>
  </div>
  <div class="right">
     <img class="rightImg" src="pic.png" alt="">
  </div>
</div>
</body>
</html>
